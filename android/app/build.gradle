plugins {
    id "com.android.application"
    id "org.jetbrains.kotlin.android"
    id "dev.flutter.flutter-gradle-plugin"
    id "com.google.gms.google-services"
}

// Add this right below the plugins block to fix the "Unresolved reference: io"
def localProperties = new Properties()
def localPropertiesFile = rootProject.file('local.properties')
if (localPropertiesFile.exists()) {
    localPropertiesFile.withReader('UTF-8') { reader ->
        localProperties.load(reader)
    }
}

def flutterRoot = localProperties.getProperty('flutter.sdk')
if (flutterRoot == null) {
    throw new GradleException("Flutter SDK not found. Define location with flutter.sdk in the local.properties file.")
}


android {
    namespace = "com.example.find_me"
    compileSdk = flutter.compileSdkVersion
    ndkVersion = flutter.ndkVersion

    // ADD THIS BLOCK
    kotlinOptions {
        jvmTarget = "17"
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
        //sourceCompatibility = JavaVersion.VERSION_17
        //targetCompatibility = JavaVersion.VERSION_17
    }

    // ADD THIS to be extra safe
    kotlin {
        jvmToolchain(17)
    }

    defaultConfig {
        // TODO: Specify your own unique Application ID (https://developer.android.com/studio/build/application-id.html).
        applicationId = "com.example.find_me"
        // You can update the following values to match your application needs.
        // For more information, see: https://flutter.dev/to/review-gradle-config.
        //minSdk = flutter.minSdkVersion
        minSdk = 21
        targetSdk = flutter.targetSdkVersion
        versionCode = flutter.versionCode
        versionName = flutter.versionName
    }

    buildTypes {
        release {
            // TODO: Add your own signing config for the release build.
            // Signing with the debug keys for now, so `flutter run --release` works.
            signingConfig = signingConfigs.debug
        }
    }
}

flutter {
    source = "../.."
}

dependencies {
    // 1. Force the Flutter embedding to be visible to Kotlin
    //def flutterCompileMode = (project.hasProperty('mode') ? project.property('mode') : 'debug')
    //implementation "io.flutter:flutter_embedding_$flutterCompileMode:1.0.0-+"

    // 2. Keep your existing ones
    implementation 'com.google.firebase:firebase-messaging:23.4.0'
    implementation "org.jetbrains.kotlin:kotlin-stdlib:1.9.22"
}

apply from: "$flutterRoot/packages/flutter_tools/gradle/flutter.gradle"